          description: Internal Server Error
      summary: List Munki tokens
      tags:
        - Munki
    post:
      operationId: create-munki-token
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
          description: Created
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "500":
          content:
