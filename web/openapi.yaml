components:
  schemas:
    Account:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/Account.json
          format: uri
          readOnly: true
          type: string
        api_key:
          type: string
        api_key_created_at:
          format: date-time
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - user
      type: object
    AccountMutation:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/AccountMutation.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
        password:
          type: string
      required:
        - name
      type: object
    AgentSecret:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/AgentSecret.json
          format: uri
          readOnly: true
          type: string
        agent:
          enum:
            - orbit
            - munki
            - santa
          type: string
        created_at:
          format: date-time
          type: string
        id:
          format: int64
          type: integer
        value:
          type: string
      required:
        - id
        - agent
        - value
        - created_at
      type: object
    AgentSecretCreate:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/AgentSecretCreate.json
          format: uri
          readOnly: true
          type: string
        agent:
          enum:
            - orbit
            - munki
            - santa
          type: string
        value:
          minLength: 32
          type: string
      required:
        - agent
        - value
      type: object
    AgentSecretMutation:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/AgentSecretMutation.json
          format: uri
          readOnly: true
          type: string
        value:
          minLength: 32
          type: string
      required:
        - value
      type: object
    BulkIDsBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/BulkIDsBody.json
          format: uri
          readOnly: true
          type: string
        ids:
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
      required:
        - ids
      type: object
    BundleReference:
      additionalProperties: false
      properties:
        binary_count:
          format: int32
          type: integer
        bundle_id:
          type: string
        collected_binary_count:
          format: int32
          type: integer
        complete:
          type: boolean
        hash_millis:
          format: int32
          type: integer
        name:
          type: string
        path:
          type: string
        sha256:
          type: string
        uploaded_at:
          format: date-time
          type: string
        version:
          type: string
        version_string:
          type: string
      required:
        - sha256
        - bundle_id
        - name
        - path
        - version
        - version_string
        - binary_count
        - collected_binary_count
        - hash_millis
        - complete
      type: object
    CertificateName:
      additionalProperties: false
      properties:
        common_name:
          type: string
        country:
          type: string
        organization:
          type: string
        organizational_unit:
          type: string
      required:
        - country
        - organization
        - organizational_unit
        - common_name
      type: object
    CertificateReference:
      additionalProperties: false
      properties:
        common_name:
          type: string
        organization:
          type: string
        organizational_unit:
          type: string
        rule_count:
          format: int32
          type: integer
        sha256:
          type: string
        valid_from:
          format: date-time
          type: string
        valid_until:
          format: date-time
          type: string
      required:
        - sha256
        - common_name
        - organization
        - organizational_unit
        - rule_count
      type: object
    Check:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/Check.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        created_by_user_id:
          format: int64
          type: integer
        description:
          type: string
        failing_host_count:
          format: int32
          type: integer
        id:
          format: int64
          type: integer
        name:
          type: string
        passing_host_count:
          format: int32
          type: integer
        query:
          type: string
        targets:
          items:
            $ref: "#/components/schemas/TargetLabel"
          type:
            - array
            - "null"
        updated_at:
          format: date-time
          type: string
      required:
        - id
        - name
        - description
        - query
        - targets
        - passing_host_count
        - failing_host_count
        - created_at
        - updated_at
      type: object
    CheckHostStatus:
      additionalProperties: false
      properties:
        check_id:
          format: int64
          type: integer
        check_name:
          type: string
        host_id:
          format: int64
          type: integer
        host_name:
          type: string
        response:
          enum:
            - pass
            - fail
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - check_id
        - check_name
        - host_id
        - host_name
        - response
      type: object
    CheckMutation:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/CheckMutation.json
          format: uri
          readOnly: true
          type: string
        description:
          type: string
        name:
          type: string
        query:
          type: string
        targets:
          items:
            $ref: "#/components/schemas/TargetLabel"
          type:
            - array
            - "null"
      required:
        - name
        - query
        - targets
      type: object
    ConfigurationMatch:
      additionalProperties: false
      properties:
        allowed_path_regex:
          type: string
        batch_size:
          format: int32
          type: integer
        blocked_path_regex:
          type: string
        client_mode:
          enum:
            - monitor
            - lockdown
            - standalone
          type: string
        created_at:
          format: date-time
          type: string
        description:
          type: string
        enable_all_event_upload:
          type: boolean
        enable_bundles:
          type: boolean
        enable_transitive_rules:
          type: boolean
        encrypted_removable_media_policy:
          $ref: "#/components/schemas/RemovableMediaPolicy"
        event_detail_text:
          type: string
        event_detail_url:
          type: string
        full_sync_interval_seconds:
          format: int32
          type: integer
        id:
          format: int64
          type: integer
        matched_via_label:
          $ref: "#/components/schemas/LabelMatch"
        name:
          type: string
        position:
          format: int32
          type: integer
        removable_media_policy:
          $ref: "#/components/schemas/RemovableMediaPolicy"
        targets:
          items:
            $ref: "#/components/schemas/TargetLabel"
          type:
            - array
            - "null"
        updated_at:
          format: date-time
          type: string
      required:
        - id
        - name
        - description
        - position
        - client_mode
        - enable_bundles
        - enable_transitive_rules
        - enable_all_event_upload
        - full_sync_interval_seconds
        - batch_size
        - targets
        - created_at
        - updated_at
      type: object
    ConfigurationMutation:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/ConfigurationMutation.json
          format: uri
          readOnly: true
          type: string
        allowed_path_regex:
          type: string
        batch_size:
          format: int32
          maximum: 100
          minimum: 5
          type: integer
        blocked_path_regex:
          type: string
        client_mode:
          enum:
            - monitor
            - lockdown
            - standalone
          type: string
        description:
          type: string
        enable_all_event_upload:
          type: boolean
        enable_bundles:
          type: boolean
        enable_transitive_rules:
          type: boolean
        encrypted_removable_media_policy:
          $ref: "#/components/schemas/RemovableMediaPolicy"
        event_detail_text:
          type: string
        event_detail_url:
          type: string
        full_sync_interval_seconds:
          format: int32
          minimum: 60
          type: integer
        name:
          type: string
        removable_media_policy:
          $ref: "#/components/schemas/RemovableMediaPolicy"
        targets:
          items:
            $ref: "#/components/schemas/TargetLabel"
          type:
            - array
            - "null"
      required:
        - name
        - client_mode
        - enable_bundles
        - enable_transitive_rules
        - enable_all_event_upload
        - full_sync_interval_seconds
        - batch_size
        - targets
      type: object
    Criteria:
      additionalProperties: false
      properties:
        attribute:
          type: string
        values:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - attribute
        - values
      type: object
    Department:
      additionalProperties: false
      properties:
        value:
          type: string
      required:
        - value
      type: object
    DirectoryGroup:
      additionalProperties: false
      properties:
        display_name:
          type: string
        external_id:
          type: string
        id:
          format: int64
          type: integer
        last_synced_at:
          format: date-time
          type: string
        mail_nickname:
          type: string
      required:
        - id
        - external_id
        - display_name
        - last_synced_at
      type: object
    DirectoryUser:
      additionalProperties: false
      properties:
        active:
          type: boolean
        department:
          type: string
        display_name:
          type: string
        external_id:
          type: string
        family_name:
          type: string
        given_name:
          type: string
        id:
          format: int64
          type: integer
        last_synced_at:
          format: date-time
          type: string
        mail:
          type: string
        mail_nickname:
          type: string
        user_principal_name:
          type: string
      required:
        - id
        - external_id
        - user_principal_name
        - display_name
        - active
        - last_synced_at
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Executable:
      additionalProperties: false
      properties:
        cdhash:
          type: string
        codesigning_flags:
          format: int32
          minimum: 0
          type: integer
        entitlements:
          additionalProperties: {}
          type: object
        file_bundle_binary_count:
          format: int32
          type: integer
        file_bundle_executable_rel_path:
          type: string
        file_bundle_hash:
          type: string
        file_bundle_hash_millis:
          format: int32
          type: integer
        file_bundle_id:
          type: string
        file_bundle_name:
          type: string
        file_bundle_path:
          type: string
        file_bundle_version:
          type: string
        file_bundle_version_string:
          type: string
        file_name:
          type: string
        id:
          format: int64
          type: integer
        secure_signing_time:
          format: date-time
          type: string
        sha256:
          type: string
        signing_chain:
          items:
            $ref: "#/components/schemas/SigningChainEntry"
          type:
            - array
            - "null"
        signing_id:
          type: string
        signing_status:
          enum:
            - unspecified
            - unsigned
            - invalid
            - adhoc
            - development
            - production
          type: string
        signing_time:
          format: date-time
          type: string
        team_id:
          type: string
      required:
        - id
        - sha256
        - file_name
        - file_bundle_id
        - file_bundle_path
        - file_bundle_executable_rel_path
        - file_bundle_name
        - file_bundle_version
        - file_bundle_version_string
        - file_bundle_hash
        - file_bundle_hash_millis
        - file_bundle_binary_count
        - signing_id
        - team_id
        - cdhash
        - codesigning_flags
        - signing_status
      type: object
    ExecutableReference:
      additionalProperties: false
      properties:
        block_count:
          format: int32
          type: integer
        cdhash:
          type: string
        execution_count:
          format: int32
          type: integer
        file_bundle_id:
          type: string
        file_bundle_name:
          type: string
        file_bundle_version:
          type: string
        file_name:
          type: string
        sha256:
          type: string
        signing_id:
          type: string
        team_id:
          type: string
      required:
        - sha256
        - file_name
        - execution_count
        - block_count
      type: object
    ExecutionEvent:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/ExecutionEvent.json
          format: uri
          readOnly: true
          type: string
        current_sessions:
          items:
            type: string
          type:
            - array
            - "null"
        decision:
          enum:
            - unknown
            - allow_unknown
            - allow_binary
            - allow_certificate
            - allow_scope
            - allow_teamid
            - allow_signingid
            - allow_cdhash
            - block_unknown
            - block_binary
            - block_certificate
            - block_scope
            - block_teamid
            - block_signingid
            - block_cdhash
            - bundle_binary
          type: string
        executable:
          $ref: "#/components/schemas/Executable"
        executing_user:
          type: string
        file_path:
          type: string
        host:
          $ref: "#/components/schemas/HostSummary"
        host_id:
          format: int64
          type: integer
        id:
          format: int64
          type: integer
        ingested_at:
          format: date-time
          type: string
        logged_in_users:
          items:
            type: string
          type:
            - array
            - "null"
        occurred_at:
          format: date-time
          type: string
        parent_name:
          type: string
        pid:
          format: int32
          type: integer
        ppid:
          format: int32
          type: integer
      required:
        - id
        - host_id
        - host
        - executable
        - file_path
        - executing_user
        - pid
        - ppid
        - parent_name
        - logged_in_users
        - current_sessions
        - decision
        - occurred_at
        - ingested_at
      type: object
    FileAccessEvent:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/FileAccessEvent.json
          format: uri
          readOnly: true
          type: string
        decision:
          enum:
            - unknown
            - denied
            - denied_invalid_signature
            - audit_only
          type: string
        host:
          $ref: "#/components/schemas/HostSummary"
        host_id:
          format: int64
          type: integer
        id:
          format: int64
          type: integer
        ingested_at:
          format: date-time
          type: string
        occurred_at:
          format: date-time
          type: string
        primary_process:
          $ref: "#/components/schemas/Process"
        process_chain:
          items:
            $ref: "#/components/schemas/Process"
          type:
            - array
            - "null"
        rule_name:
          type: string
        rule_version:
          type: string
        target:
          type: string
      required:
        - id
        - host_id
        - host
        - rule_version
        - rule_name
        - target
        - decision
        - primary_process
        - occurred_at
        - ingested_at
      type: object
    Handle:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/Handle.json
          format: uri
          readOnly: true
          type: string
        id:
          format: int64
          type: integer
        resolved_host_count:
          format: int64
          type: integer
        sql:
          type: string
        started_at:
          format: date-time
          type: string
      required:
        - id
        - sql
        - started_at
        - resolved_host_count
      type: object
    Host:
      additionalProperties: false
