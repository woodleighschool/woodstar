info:
  description: Typed admin and frontend API.
  license:
    name: Apache-2.0
  title: Woodstar API
  version: 7aeb097-dirty
openapi: 3.1.0
paths:
  /api/account:
    get:
      operationId: get-account
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get the signed-in user's account, including any API key
      tags:
        - Account
    put:
      operationId: update-account
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPutBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Update the signed-in user's account
      tags:
        - Account
  /api/account/api-key:
    delete:
      operationId: revoke-account-api-key
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Clear the API key on the signed-in user's account
      tags:
        - Account
    post:
      operationId: rotate-account-api-key
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBody"
          description: Created
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Generate a new API key for the signed-in user, replacing any prior key
      tags:
        - Account
  /api/auth/login:
    post:
      operationId: create-session
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
