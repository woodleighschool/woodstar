components:
  schemas:
    DeviceMappingBody:
      additionalProperties: false
      properties:
        email:
          type: string
        source:
          type: string
      required:
        - email
        - source
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    HostBatteryBody:
      additionalProperties: false
      properties:
        chemistry:
          type: string
        current_capacity:
          format: int32
          type: integer
        cycle_count:
          format: int32
          type: integer
        designed_capacity:
          format: int32
          type: integer
        health:
          type: string
        manufacturer:
          type: string
        max_capacity:
          format: int32
          type: integer
        model:
          type: string
        percent_remaining:
          format: double
          type: number
        serial_number:
          type: string
      required:
        - serial_number
        - manufacturer
        - model
        - chemistry
        - health
      type: object
    HostBody:
      additionalProperties: false
