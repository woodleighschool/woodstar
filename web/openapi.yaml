        key_strength:
          format: int32
          type: integer
        key_usage:
          type: string
        not_valid_after:
          format: date-time
          type: string
        not_valid_before:
          format: date-time
          type: string
        serial:
          type: string
        signing_algorithm:
          type: string
        source:
          type: string
        subject:
          $ref: "#/components/schemas/CertificateName"
        username:
