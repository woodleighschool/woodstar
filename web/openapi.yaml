    HostDetail:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/api/schemas/HostDetail.json
          format: uri
          readOnly: true
          type: string
        agents:
          $ref: "#/components/schemas/HostAgents"
        batteries:
          items:
            $ref: "#/components/schemas/HostBattery"
          type:
            - array
            - "null"
        certificates:
          items:
            $ref: "#/components/schemas/HostCertificate"
          type:
            - array
            - "null"
        computer_name:
          type: string
        display_name:
          type: string
        enrollment:
          $ref: "#/components/schemas/HostEnrollment"
        hardware:
          $ref: "#/components/schemas/HostHardware"
        hostname:
          type: string
        id:
          format: int64
          type: integer
        labels:
          items:
            $ref: "#/components/schemas/Label"
          type:
            - array
            - "null"
        munki:
          $ref: "#/components/schemas/MunkiHostState"
        network:
          $ref: "#/components/schemas/HostNetwork"
        os:
          $ref: "#/components/schemas/HostOS"
        santa:
          $ref: "#/components/schemas/SantaHostState"
        status:
          type: string
        storage:
          $ref: "#/components/schemas/HostStorage"
        timestamps:
          $ref: "#/components/schemas/HostTimestamps"
        user_affinity:
          $ref: "#/components/schemas/HostUserAffinity"
