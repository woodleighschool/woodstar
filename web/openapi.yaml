components:
  schemas:
    DeviceMappingBody:
      additionalProperties: false
      properties:
        email:
          type: string
        source:
          type: string
      required:
        - email
        - source
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    HostBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/HostBody.json
          format: uri
          readOnly: true
          type: string
        computer_name:
          type: string
        cpu_brand:
          type: string
        cpu_logical_cores:
          format: int64
          type: integer
        cpu_physical_cores:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        detail_updated_at:
          format: date-time
          type: string
        device_mappings:
          items:
            $ref: "#/components/schemas/DeviceMappingBody"
          type:
            - array
            - "null"
        display_name:
          type: string
        enrolled_at:
          format: date-time
          type: string
        hardware_model:
          type: string
        hardware_serial:
          type: string
        hardware_uuid:
          type: string
        hardware_vendor:
          type: string
        hostname:
          type: string
        id:
          type: string
        kernel_version:
          type: string
        last_seen_at:
          format: date-time
          type: string
        orbit_version:
          type: string
        os_version:
          type: string
        osquery_version:
          type: string
        physical_memory:
          format: int64
          type: integer
        platform:
          type: string
        platform_like:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - id
        - hardware_uuid
        - display_name
        - hostname
        - computer_name
        - hardware_serial
        - hardware_model
        - platform
        - platform_like
        - os_version
        - osquery_version
        - orbit_version
        - cpu_brand
        - cpu_logical_cores
        - cpu_physical_cores
        - physical_memory
        - hardware_vendor
        - kernel_version
        - device_mappings
        - created_at
        - updated_at
      type: object
    HostListBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/HostListBody.json
          format: uri
          readOnly: true
          type: string
        count:
          format: int64
          type: integer
        items:
          items:
            $ref: "#/components/schemas/HostBody"
          type:
            - array
            - "null"
      required:
        - items
        - count
      type: object
    HostSoftwareBody:
      additionalProperties: false
      properties:
        app_store_app: {}
        display_name:
          type: string
        extension_for:
          type: string
        icon_url:
          type:
            - string
            - "null"
        id:
          type: string
        installed_versions:
          items:
            $ref: "#/components/schemas/HostSoftwareInstalledVersionBody"
          type:
            - array
            - "null"
        name:
          type: string
        software_package: {}
        source:
          type: string
        status: {}
      required:
        - id
        - name
        - display_name
        - icon_url
        - source
        - extension_for
        - status
        - installed_versions
        - software_package
        - app_store_app
      type: object
    HostSoftwareInstalledVersionBody:
      additionalProperties: false
      properties:
        bundle_identifier:
          type: string
        installed_paths:
          items:
            type: string
          type:
            - array
            - "null"
        last_opened_at:
          format: date-time
          type: string
        signature_information:
          items:
            $ref: "#/components/schemas/PathSignatureInformationBody"
          type:
            - array
            - "null"
        version:
          type: string
      required:
        - version
        - bundle_identifier
        - installed_paths
        - signature_information
      type: object
    HostSoftwareListBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/HostSoftwareListBody.json
          format: uri
          readOnly: true
          type: string
        count:
          format: int64
          type: integer
        items:
          items:
            $ref: "#/components/schemas/HostSoftwareBody"
          type:
            - array
            - "null"
      required:
        - items
        - count
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        password:
          minLength: 1
          type: string
      required:
        - email
        - password
      type: object
    PathSignatureInformationBody:
      additionalProperties: false
      properties:
        executable_path:
          type: string
        executable_sha256:
          type: string
        hash_sha256:
          type: string
        installed_path:
          type: string
        team_identifier:
          type: string
      required:
        - installed_path
        - team_identifier
        - hash_sha256
        - executable_sha256
        - executable_path
      type: object
    Secret:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/Secret.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        id:
          type: string
        value:
          type: string
      required:
        - id
        - value
        - created_at
      type: object
    SetupInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/SetupInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        name:
          type: string
        password:
          minLength: 12
          type: string
      required:
        - email
        - password
      type: object
    SetupStatusOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/SetupStatusOutputBody.json
          format: uri
          readOnly: true
          type: string
        complete:
          type: boolean
      required:
        - complete
      type: object
    SoftwareGetBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/SoftwareGetBody.json
          format: uri
          readOnly: true
          type: string
        software_title:
          $ref: "#/components/schemas/SoftwareTitleBody"
      required:
        - software_title
      type: object
    SoftwareListBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/SoftwareListBody.json
          format: uri
          readOnly: true
          type: string
        count:
          format: int64
          type: integer
        items:
          items:
            $ref: "#/components/schemas/SoftwareTitleBody"
          type:
            - array
            - "null"
      required:
        - items
        - count
      type: object
    SoftwareTitleBody:
      additionalProperties: false
      properties:
        app_store_app: {}
        browser:
          type: string
        bundle_identifier:
          type: string
        counts_updated_at:
          format: date-time
          type:
            - string
            - "null"
        display_name:
          type: string
        extension_for:
          type: string
        hosts_count:
          format: int64
          type: integer
        icon_url:
          type:
            - string
            - "null"
        id:
          type: string
        name:
          type: string
        software_package: {}
        source:
          type: string
        versions:
          items:
            $ref: "#/components/schemas/SoftwareVersionBody"
          type:
            - array
            - "null"
        versions_count:
          format: int64
          type: integer
      required:
        - id
        - name
        - display_name
        - icon_url
        - source
        - extension_for
        - browser
        - hosts_count
        - versions_count
        - versions
        - counts_updated_at
        - software_package
        - app_store_app
      type: object
    SoftwareVersionBody:
      additionalProperties: false
      properties:
        bundle_identifier:
          type: string
        hosts_count:
          format: int64
          type: integer
        id:
          type: string
        version:
          type: string
      required:
        - id
        - version
        - hosts_count
      type: object
    UserBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/UserBody.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
        role:
          type: string
      required:
        - id
        - email
        - name
        - role
        - created_at
      type: object
    UserCreateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/UserCreateInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        name:
          type: string
        password:
          minLength: 12
          type: string
        role:
          enum:
            - admin
            - viewer
          type: string
      required:
        - email
        - role
        - password
      type: object
    UserUpdateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/UserUpdateInputBody.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
        password:
          minLength: 12
          type: string
        role:
          enum:
            - admin
            - viewer
          type: string
      type: object
    VersionOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/VersionOutputBody.json
          format: uri
          readOnly: true
          type: string
        started_at:
          type: string
        version:
          type: string
      required:
        - version
        - started_at
      type: object
info:
  description: Typed admin and frontend API.
  license:
    name: Apache-2.0
  title: Woodstar API
  version: 27a7090-dirty
openapi: 3.1.0
paths:
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Create a local admin session
      tags:
        - Auth
  /api/auth/logout:
    post:
      operationId: logout
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke the current session
      tags:
        - Auth
  /api/auth/me:
    get:
      operationId: get-current-user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get the current signed-in user
      tags:
        - Auth
  /api/healthz:
    get:
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Liveness check
      tags:
        - System
  /api/hosts:
    get:
      operationId: list-hosts
      parameters:
        - explode: false
          in: query
          name: q
          schema:
            type: string
        - explode: false
          in: query
          name: page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: per_page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: order_key
          schema:
            type: string
        - explode: false
          in: query
          name: order_direction
          schema:
            type: string
        - explode: false
          in: query
          name: platform
          schema:
            type: string
        - explode: false
          in: query
          name: software_title_id
          schema:
            type: string
        - explode: false
          in: query
          name: software_id
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostListBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: List enrolled hosts
      tags:
        - Hosts
  /api/hosts/{id}:
    get:
      operationId: get-host
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get an enrolled host
      tags:
        - Hosts
  /api/hosts/{id}/software:
    get:
      operationId: list-host-software
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: q
          schema:
            type: string
        - explode: false
          in: query
          name: page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: per_page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: order_key
          schema:
            type: string
        - explode: false
          in: query
          name: order_direction
          schema:
            type: string
        - explode: false
          in: query
          name: source
          schema:
            items:
              type: string
            type:
              - array
              - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostSoftwareListBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: List software installed on a host
      tags:
        - Hosts
  /api/munki/tokens:
    get:
      operationId: list-munki-tokens
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Secret"
                type:
                  - array
                  - "null"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "500":
          content:
            application/problem+json:
              schema:
