info:
  description: Typed admin and frontend API.
  license:
    name: Apache-2.0
  title: Woodstar API
  version: 7e72ee9-dirty
openapi: 3.1.0
paths:
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Create a local admin session
      tags:
        - Auth
  /api/auth/logout:
    post:
      operationId: logout
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke the current session
      tags:
        - Auth
  /api/auth/session:
    get:
      operationId: get-session
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get setup state and the current signed-in user, if any
      tags:
        - Auth
  /api/healthz:
    get:
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Liveness check
      tags:
        - System
  /api/hosts:
    get:
      operationId: list-hosts
      parameters:
        - explode: false
          in: query
          name: q
          schema:
            type: string
        - explode: false
          in: query
          name: page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: per_page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: order_key
          schema:
            type: string
        - explode: false
          in: query
          name: order_direction
          schema:
            type: string
        - explode: false
          in: query
          name: status
          schema:
            type: string
        - explode: false
          in: query
          name: platform
          schema:
            type: string
        - explode: false
          in: query
          name: label_id
          schema:
            type: string
        - explode: false
          in: query
          name: software_title_id
          schema:
            type: string
        - explode: false
          in: query
          name: software_id
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostListBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: List enrolled hosts
      tags:
        - Hosts
  /api/hosts/{id}:
    get:
      operationId: get-host
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get an enrolled host
      tags:
        - Hosts
  /api/hosts/{id}/software:
    get:
      operationId: list-host-software
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: q
          schema:
            type: string
        - explode: false
          in: query
          name: page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: per_page
          schema:
            format: int64
            type: integer
        - explode: false
          in: query
          name: order_key
          schema:
            type: string
        - explode: false
          in: query
          name: order_direction
          schema:
            type: string
        - explode: false
          in: query
          name: source
          schema:
            items:
              type: string
            type:
              - array
              - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostSoftwareListBody"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
