components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        password:
          minLength: 1
          type: string
      required:
        - email
        - password
      type: object
    Secret:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/Secret.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        id:
          type: string
        value:
          type: string
      required:
        - id
        - value
        - created_at
      type: object
    SetupInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/SetupInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        name:
          type: string
        password:
          minLength: 12
          type: string
      required:
        - email
        - password
      type: object
    SetupStatusOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/SetupStatusOutputBody.json
          format: uri
          readOnly: true
          type: string
        complete:
          type: boolean
      required:
        - complete
      type: object
    UserBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/UserBody.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
        role:
          type: string
      required:
        - id
        - email
        - name
        - role
        - created_at
      type: object
    UserCreateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/UserCreateInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        name:
          type: string
        password:
          minLength: 12
          type: string
        role:
          enum:
            - admin
            - viewer
          type: string
      required:
        - email
        - role
        - password
      type: object
    UserUpdateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/UserUpdateInputBody.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
        password:
          minLength: 12
          type: string
        role:
          enum:
            - admin
            - viewer
          type: string
      type: object
    VersionOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //api/schemas/VersionOutputBody.json
          format: uri
          readOnly: true
          type: string
        started_at:
          type: string
        version:
          type: string
      required:
        - version
        - started_at
      type: object
