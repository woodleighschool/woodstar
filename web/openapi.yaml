        config_tls_refresh:
          format: int32
          type: integer
        cpu_brand:
          type: string
        cpu_logical_cores:
          format: int64
          type: integer
        cpu_physical_cores:
          format: int64
          type: integer
        cpu_subtype:
          type: string
        cpu_type:
          type: string
        created_at:
