          items:
            $ref: "#/components/schemas/HostUser"
          type:
            - array
            - "null"
      required:
        - labels
        - users
        - batteries
        - certificates
        - id
        - display_name
        - status
        - hostname
        - computer_name
        - enrollment
        - hardware
        - os
        - storage
        - network
        - agents
        - user_affinity
        - timestamps
      type: object
    HostEnrollment:
      additionalProperties: false
      properties:
        agent:
          type: string
        enrolled_at:
          format: date-time
          type: string
      required:
        - agent
      type: object
    HostHardware:
      additionalProperties: false
      properties:
        cpu:
          $ref: "#/components/schemas/HostCPU"
        memory_bytes:
          format: int64
          type: integer
        model_identifier:
          type: string
        serial:
          type: string
        uuid:
          type: string
        vendor:
          type: string
      required:
        - uuid
        - serial
        - vendor
        - model_identifier
        - memory_bytes
        - cpu
