        display_name:
          type: string
        enrollment:
          $ref: "#/components/schemas/HostEnrollment"
        hardware:
          $ref: "#/components/schemas/HostHardware"
        hostname:
          type: string
        id:
          format: int64
          type: integer
        network:
          $ref: "#/components/schemas/HostNetwork"
        os:
