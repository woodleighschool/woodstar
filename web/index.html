<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Woodstar</title>
    <script>
      /* Anti-FOUC: apply theme class and background before first paint */
      (function () {
        try {
          const root = document.documentElement;
          const media = window.matchMedia("(prefers-color-scheme: dark)");
          const storedTheme = window.localStorage.getItem("theme");
          const isDark =
            storedTheme === "dark" ||
            ((storedTheme === null || storedTheme === "system" || storedTheme === "auto") &&
              media.matches);

          if (isDark) {
            root.classList.add("dark");
          } else {
            root.classList.remove("dark");
          }

          const bgColor = isDark ? "oklch(0.2 0.006 80)" : "#e9e3dc";
          root.style.backgroundColor = bgColor;
        } catch (_err) {
          // Fallback to dark if theme preference is unreadable.
          const root = document.documentElement;
          root.classList.add("dark");
          root.style.backgroundColor = "oklch(0.2 0.006 80)";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
