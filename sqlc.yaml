---
version: "2"
sql:
  - engine: postgresql
    schema: internal/database/migrations
    queries: internal/database/queries
    gen:
      go:
        package: sqlc
        out: internal/database/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        query_parameter_limit: 0
        initialisms:
          - id
          - uuid
          - os
          - cpu
          - ip
          - mac
          - tls
          - api
          - url
          - uid
        overrides:
          - db_type: timestamptz
            go_type: time.Time
          - db_type: timestamptz
            nullable: true
            go_type:
              import: time
              type: Time
              pointer: true
          - db_type: label_scope_mode
            go_type:
              import: github.com/woodleighschool/woodstar/internal/scope
              type: LabelScopeMode
