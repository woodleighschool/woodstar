---
version: "2"

issues:
  max-same-issues: 0

formatters:
  enable:
    - goimports
    - golines
    - gci
    - gofumpt
  settings:
    goimports:
      local-prefixes:
        - github.com/woodleighschool/woodstar
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/woodleighschool/woodstar)
      custom-order: true
    golines:
      max-len: 120

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - funlen
    - gocognit
    - gocritic
    - govet
    - ineffassign
    - interfacebloat
    - intrange
    - makezero
    - mirror
    - misspell
    - modernize
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - perfsprint
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unused
    - usestdlibvars
    - usetesting

  settings:
    dupl:
      threshold: 100

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true

    funlen:
      lines: 80
      statements: 80

    gocognit:
      min-complexity: 15

    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch

    govet:
      enable:
        - nilness

    interfacebloat:
      max: 5

    perfsprint:
      strconcat: false

    revive:
      severity: error
      enable-default-rules: true
      rules:
        - name: context-as-argument
          arguments:
            - allowTypesBefore: "*testing.T,*testing.B,*testing.F,testing.TB"
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration

    staticcheck:
      checks:
        - all
        - -ST1000 # package comments are optional in internal product packages
        - -QF1008 # omit embedded fields from selector

    usetesting:
      os-temp-dir: true

  exclusions:
    generated: lax
    warn-unused: true
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - gocognit
          - noctx

run:
  relative-path-mode: gomod
