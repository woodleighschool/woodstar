experimental_monorepo_root = true

[tools]
go = "1.26.5"
node = "26.5.0"
pnpm = "11.15.1"
golangci-lint = "2.12.2"
air = "1.67.1"
lefthook = "2.1.10"
cosign = "3.1.2"
zizmor = "1.27.0"
oxfmt = "0.59.0"
oxlint = "1.74.0"
mkcert = "1.4.4"

[settings]
experimental = true
pin = true
lockfile = true

[monorepo]
config_roots = ["web", "docs"]

[tasks.go-deps]
description = "Download Go dependencies"
run = "go mod download"

[tasks.deps]
description = "Install backend and web dependencies"
depends = ["go-deps", "//web:deps"]

[tasks.dev]
description = "Run backend and web development servers"
depends = ["//web:build"]
run = { tasks = ["dev-backend", "//web:dev"] }

[tasks.dev-tls]
description = "Generate repo-local development TLS files"
run = """
mkdir -p tmp/tls/ca
CAROOT="$PWD/tmp/tls/ca" mkcert \
  -cert-file tmp/tls/woodstar.pem \
  -key-file tmp/tls/woodstar-key.pem \
  woodstar
"""

[tasks.dev-tls-trust]
description = "Trust the repo-local development CA on this machine"
depends = ["dev-tls"]
run = 'CAROOT="$PWD/tmp/tls/ca" mkcert -install'

[tasks.dev-backend]
description = "Run backend development server"
run = """
set -a
[ ! -f .env ] || . ./.env
set +a
air -c .air.toml
"""

[tasks.build]
description = "Build web bundle and backend binary"
depends = ["//web:build"]
run = { task = "backend" }

[tasks.backend]
description = "Build backend binary"
run = "go build -o woodstar ./cmd/woodstar"

[tasks.tidy]
description = "Tidy the Go module"
run = "go mod tidy"

[tasks.tidy-check]
description = "Check the Go module is tidy"
run = "go mod tidy -diff"

[tasks.test]
description = "Run dependency-free Go checks"
run = ["go vet ./...", "go test -race -count=1 ./..."]

[tasks.test-postgres]
description = "Run PostgreSQL component tests"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=postgres ./internal/...
"""

[tasks.test-e2e-munki]
description = "Run the Munki end-to-end lifecycle"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=e2e -v -run '^TestMunki$' ./test/e2e
"""

[tasks.test-e2e-osquery]
description = "Run the osquery end-to-end lifecycles"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=e2e -v -run '^TestOsquery(d)?$' ./test/e2e
"""

[tasks.test-e2e-santa]
description = "Run the Santa end-to-end protobuf lifecycle"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=e2e -v -run '^TestSanta$' ./test/e2e
"""

[tasks.test-integration-storage]
description = "Run Garage-backed S3 backend conformance"
run = "go test -race -count=1 -tags=integration -v -run '^TestS3StorageBackend$' ./test/integration/storage"

[tasks.test-e2e-mdp]
description = "Run the MDP end-to-end mirroring lifecycle"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=e2e -v -run '^TestMDP$' ./test/e2e
"""

[tasks.test-e2e-orbit]
description = "Run the Orbit protocol fixture lifecycle"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=e2e -v -run '^TestOrbit$' ./test/e2e
"""

[tasks.test-e2e]
description = "Run all end-to-end lifecycles"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -tags=e2e -v ./test/e2e
"""

[tasks.test-integration]
description = "Run integration suites"
run = [{ task = "test-integration-storage" }]

[tasks.test-all]
description = "Run dependency-free, PostgreSQL, integration, and end-to-end tests"
run = [
  { task = "test" },
  { task = "test-postgres" },
  { task = "test-integration" },
  { task = "test-e2e" },
]

[tasks.openapi]
description = "Generate OpenAPI schema"
run = "go run ./cmd/woodstar openapi --output web/openapi.yaml"

[tasks.openapi-types]
description = "Generate OpenAPI schema and clients"
run = [
  { task = "openapi" },
  { task = "//web:openapi-types" },
  "go tool oapi-codegen -config test/e2e/adminapi/oapi-codegen.yaml -o test/e2e/adminapi/client.gen.go web/openapi.yaml",
]

[tasks.generate]
description = "Regenerate checked-in generated artifacts"
run = { task = "openapi-types" }

[tasks.go-lint]
description = "Run Go linters"
run = "golangci-lint run"

[tasks.go-lint-fix]
description = "Run Go linters and apply fixes"
run = "golangci-lint run --fix"

[tasks.lint]
description = "Run backend and web linters"
depends = ["go-lint", "//web:lint"]

[tasks.go-format]
description = "Format Go code"
run = "go fmt ./..."

[tasks.go-fmt-check]
description = "Check Go formatting"
run = "test -z \"$(gofmt -l .)\" || { gofmt -l .; exit 1; }"

[tasks.format]
description = "Format backend and web code"
depends = ["go-format", "//web:format"]

[tasks.fmt-check]
description = "Check backend and web formatting"
depends = ["go-fmt-check", "//web:fmt-check"]

[tasks.workflow-lint]
description = "Lint GitHub Actions workflows"
run = "zizmor --offline --no-ignores .github/workflows"

[tasks.clean]
description = "Remove local build outputs"
run = "rm -rf woodstar build tmp web/dist"

[tasks.schema-sync]
description = "Refresh the osquery schema snapshot"
run = "./schema/sync.sh"

[hooks]
postinstall = "lefthook install"
