experimental_monorepo_root = true

[tools]
go = "1.26.5"
node = "26.5.0"
pnpm = "11.12.0"
golangci-lint = "2.12.2"
air = "1.65.3"
lefthook = "2.1.10"
actionlint = "1.7.12"
cosign = "3.1.1"
zizmor = "1.26.1"
oxfmt = "0.58.0"
oxlint = "1.73.0"
mkcert = "1.4.4"

[settings]
experimental = true
pin = true
lockfile = true

[monorepo]
config_roots = ["web", "docs"]

[hooks]
postinstall = "lefthook install"

[tasks.deps]
description = "Install backend and web dependencies"
run = """
go mod download
mise //web:deps
"""

[tasks.dev]
description = "Run backend and web development servers"
depends = ["dev-tls", "//web:build"]
run = "mise run dev-backend ::: //web:dev"

[tasks.dev-tls]
description = "Generate repo-local development TLS files"
run = """
set -a
[ ! -f .env ] || . ./.env
set +a

mkdir -p tmp/tls/ca
CAROOT="$PWD/tmp/tls/ca" mkcert \
  -cert-file tmp/tls/woodstar.pem \
  -key-file tmp/tls/woodstar-key.pem \
  localhost woodstar host.docker.internal 127.0.0.1 ::1 \
  ${WOODSTAR_DEV_TLS_HOSTS:-} "$@"
"""

[tasks.dev-tls-trust]
description = "Trust the repo-local development CA on this machine"
depends = ["dev-tls"]
run = 'CAROOT="$PWD/tmp/tls/ca" mkcert -install'

[tasks.dev-backend]
description = "Run backend development server"
run = """
set -a
[ ! -f .env ] || . ./.env
set +a
air -c .air.toml
"""

[tasks.build]
description = "Build web bundle and backend binary"
run = """
mise //web:build
go build -o woodstar ./cmd/woodstar
"""

[tasks.backend]
description = "Build backend binary"
run = "go build -o woodstar ./cmd/woodstar"

[tasks.tidy]
description = "Check go.mod and go.sum are tidy"
run = """
go mod tidy
git diff --exit-code go.mod go.sum
"""

[tasks.test]
description = "Run fast Go suite"
run = "env -u WOODSTAR_TEST_DATABASE_URL go test -race -count=1 -v ./..."

[tasks.full-test]
description = "Run DB-backed Go suite"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -v ./...
"""

[tasks.test-integration]
description = "Run DB-backed protocol/auth integration tests"
run = """
WOODSTAR_TEST_DATABASE_URL="${WOODSTAR_TEST_DATABASE_URL:-postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable}" \
  go test -race -count=1 -v ./internal/agentauth ./internal/directory ./internal/orbit/protocol ./internal/osquery/protocol ./internal/santa/protocol
"""

[tasks.test-autopkg]
description = "Run AutoPkg processor tests"
run = "/usr/local/autopkg/python -m unittest discover -s autopkg -p 'test_woodstar_*.py'"

[tasks.openapi]
description = "Generate OpenAPI schema"
run = "go run ./cmd/woodstar openapi --output web/openapi.yaml"

[tasks.openapi-types]
description = "Generate OpenAPI schema and web types"
run = """
mise run openapi
mise run //web:openapi-types
"""

[tasks.test-openapi]
description = "Check OpenAPI schema and generated web client are current"
run = """
tmpdir=$(mktemp -d)
trap 'rm -rf "$tmpdir"' EXIT
schema="$tmpdir/openapi.yaml"
client="$tmpdir/api-client"

go run ./cmd/woodstar openapi --output "$schema"
if ! diff -q web/openapi.yaml "$schema" >/dev/null; then
  echo "ERROR: web/openapi.yaml is out of date. Run 'mise run openapi-types' and commit the result."
  diff -u web/openapi.yaml "$schema"
  exit 1
fi

pnpm --dir web exec openapi-ts -i "$schema" -o "$client" -c @hey-api/client-fetch --plugins @hey-api/typescript @hey-api/sdk
if ! diff -qr web/src/lib/api-client "$client" >/dev/null; then
  echo "ERROR: web/src/lib/api-client is out of date. Run 'mise run openapi-types' and commit the result."
  diff -ru web/src/lib/api-client "$client"
  exit 1
fi
"""

[tasks.generate]
description = "Regenerate checked-in generated artifacts"
run = "mise run openapi-types"

[tasks.go-lint]
description = "Run Go linters"
run = "golangci-lint run"

[tasks.lint]
description = "Run backend and web linters"
run = """
mise run go-lint
mise //web:lint
"""

[tasks.go-format]
description = "Format Go code"
run = "golangci-lint fmt"

[tasks.format]
description = "Format backend and web code"
run = """
mise run go-format
mise //web:format
"""

[tasks.precommit]
description = "Run the full local gate"
run = """
mise run format
mise run lint
mise run tidy
mise run full-test
mise run test-autopkg
mise run test-openapi
"""

[tasks.clean]
description = "Remove local build outputs"
run = "rm -rf woodstar build tmp web/dist"

[tasks.schema-sync]
description = "Refresh the osquery schema snapshot"
run = "./schema/sync.sh"
