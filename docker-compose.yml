services:
  woodstar:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      WOODSTAR_DATABASE_URL: postgres://woodstar:woodstar@postgres:5432/woodstar?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: woodstar
      POSTGRES_PASSWORD: woodstar
      POSTGRES_DB: woodstar
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodstar"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
