version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: woodstar
    main: ./cmd/woodstar
    binary: woodstar
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  draft: false

changelog:
  format: "[{{ .SHA }}](https://github.com/woodleighschool/woodstar/commit/{{ .SHA }}) {{ .Message }}"
  abbrev: 7
