---
version: 2

before:
  hooks:
    - mise run tidy
    - mise //web:build

builds:
  - id: woodstar
    main: ./cmd/woodstar
    binary: woodstar
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/woodleighschool/woodstar/internal/buildinfo.Version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  draft: false

dockers_v2:
  - id: woodstar
    ids:
      - woodstar
    dockerfile: Dockerfile.release
    images:
      - ghcr.io/woodleighschool/woodstar
    tags:
      - "{{ .Version }}"
      - rolling
    platforms:
      - linux/amd64
      - linux/arm64
    annotations:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: Woodstar macOS observability and admin server
      org.opencontainers.image.licenses: Apache-2.0
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.title: woodstar
      org.opencontainers.image.version: "{{ .Version }}"

docker_signs:
  - artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes

changelog:
  format: "[{{ .SHA }}](https://github.com/woodleighschool/woodstar/commit/{{ .SHA }}) {{ .Message }}"
  abbrev: 7
