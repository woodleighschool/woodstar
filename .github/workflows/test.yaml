---
name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: woodstar
          POSTGRES_PASSWORD: woodstar
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U woodstar -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -count=1 -v ./...
        env:
          WOODSTAR_TEST_DATABASE_URL: postgres://woodstar:woodstar@127.0.0.1:5432/postgres?sslmode=disable

      - name: OpenAPI up to date
        run: |
          tmp="$(mktemp)"
          go run ./cmd/woodstar openapi --output "$tmp"
          diff -u web/openapi.yaml "$tmp"
          rm -f "$tmp"

      - name: Ensure generated files are committed
        run: git diff --exit-code
