name: lint

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/lint.yml"
      - ".golangci.yml"
      - "go.mod"
      - "go.sum"
      - "**.go"

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
